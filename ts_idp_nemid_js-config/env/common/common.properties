###############################################################
# Application configuration
# PRESERVE BANNERS FOR READABILITY

esign.status.url=/sign/status.html

###############################################################
# HTTP transport settings
http.html.charset=UTF-8
http.p3p.compactpolicies=NOI DSP COR NID ADM DEV PSA OUR IND UNI PUR COM NAV INT STA

###############################################################
# Application language support
i18n.supportedlocales=sv,no,en,da

# Locale lookup table mapping common_i18n codes
# to nobp language codes.
i18n.localemap=\
        nb\=no,nn\=no,no\=no,\
        en\=en,\
        da\=da,da-DK\=da,\
        sv\=sv,sv-SE\=sv

###############################################################
# IDP-NEMID settings
#
# Application code groups
#
# USERCANCEL - User action caused error
# OPERCANCEL - Operation cancelled or interrupted by eID FOI
# BADPROTOCOL - Protocol violation, or no response from server
# UIDREVOKED - User ID cancelled or revoked
# UIDINVALID - User ID/type not valid for current operation
# UIDEXPIRED - Exactly that!
# DOCINVALID - The document to sign is invalid
nemid.codegroup.usercancel=CAN001,CAN002
nemid.codegroup.opercancel=
nemid.codegroup.badprotocol=APP001,APP003,APP004,APP007,APP008,SRV001,SRV002,SRV003,SRV004,SRV005,SRV006,SRV007,SRV009
nemid.codegroup.uidrevoked=LOCK001,LOCK002,LOCK003
nemid.codegroup.uidinvalid=OCES001,OCES002,OCES003,OCES004,OCES005,OCES006
nemid.codegroup.uidexpired=
nemid.codegroup.authfailed=AUTH001,AUTH002,AUTH003,AUTH004,AUTH005,AUTH006,AUTH007,AUTH008,AUTH009,AUTH010,AUTH011,AUTH012
nemid.codegroup.docinvalid=APP002

###############################################################
# NemID JS client activation tag settings
nemid.clientmode.standard=standard
nemid.clientmode.limited=limited
nemid.clientflow.signing=ocessign2
nemid.client.standard.width=500px
nemid.client.standard.height=450px
nemid.client.limited.width=200px
nemid.client.limited.height=250px

nemid.clienttag.parameters=<script type="text/x-nemid" id="nemid_parameters">%s</script>
nemid.clienttag.iframe=\
<iframe id="nemid_iframe" name="nemid_iframe" title="NemID" ontouchstart="" allowfullscreen="true" scrolling="no" frameborder="0" \
style="width:%s;height:%s;border:0" src="%s"></iframe>
nemid.clienttag.postbackform=<form name="postBackForm" action="%s?sref=%s" method="post"><input type="hidden" name="response" value=""/></form>
nemid.clienttag.script=\
<script>\
function onNemIDMessage(e) {\
	var event = e || event;\
	var win = document.getElementById("nemid_iframe").contentWindow, postMessage = {}, message;\
	message = JSON.parse(event.data);\
	if (event.origin !== "%s") {\
		window.alert("Received message from unexpected origin : " + event.origin);\
		return;\
	}\
	if (message.command === "SendParameters") {\
		var htmlParameters = document.getElementById("nemid_parameters").innerHTML;\
		postMessage.command = "parameters";\
		postMessage.content = htmlParameters;\
		win.postMessage(JSON.stringify(postMessage), "%s");\
	}\
	if (message.command === "changeResponseAndSubmit") {\
		document.postBackForm.response.value = message.content;\
		document.postBackForm.submit();\
	}\
}\
if (window.addEventListener) {\
	window.addEventListener("message", onNemIDMessage);\
} else if (window.attachEvent) {\
	window.attachEvent("onmessage", onNemIDMessage);\
}\
</script>

# EOF #########################################################
