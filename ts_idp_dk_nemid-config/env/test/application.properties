cprreg.request.issuer=BBS

danid.environment=OCESII_DANID_ENV_PREPROD

applet.url.prefix=https://appletk.danid.dk

cprreg.proxy.host=proxy
cprreg.proxy.port=8080
cprreg.proxy.user=
cprreg.proxy.password=

